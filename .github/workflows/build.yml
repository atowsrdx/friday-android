name: Build Friday AI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Create gradle wrapper
        run: gradle wrapper --gradle-version 8.2

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Create placeholder PNG icons
        run: |
          sudo apt-get install -y imagemagick
          for size in 48 72 96 144 192; do
            case $size in
              48) dir="mipmap-mdpi" ;;
              72) dir="mipmap-hdpi" ;;
              96) dir="mipmap-xhdpi" ;;
              144) dir="mipmap-xxhdpi" ;;
              192) dir="mipmap-xxxhdpi" ;;
            esac
            mkdir -p app/src/main/res/$dir
            convert -size ${size}x${size} xc:"#7c3aed" -fill "#a78bfa" \
              -draw "circle $((size/2)),$((size/2)) $((size/2)),2" \
              app/src/main/res/$dir/ic_launcher.png
            cp app/src/main/res/$dir/ic_launcher.png app/src/main/res/$dir/ic_launcher_round.png
          done

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FridayAI-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
