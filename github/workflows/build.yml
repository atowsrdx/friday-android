name: Build Friday AI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Create gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.2

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Create missing launcher icons
        run: |
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          # Create simple purple circle icon using Python
          python3 - <<'EOF'
import struct, zlib, os

def make_png(size, color):
    def chunk(name, data):
        c = zlib.crc32(name + data) & 0xffffffff
        return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
    r, g, b = color
    raw = b''
    for y in range(size):
        raw += b'\x00'
        for x in range(size):
            dx, dy = x - size//2, y - size//2
            if dx*dx + dy*dy <= (size//2 - 2)**2:
                raw += bytes([r, g, b, 255])
            else:
                raw += bytes([0, 0, 0, 0])
    compressed = zlib.compress(raw)
    ihdr = struct.pack('>IIBBBBB', size, size, 8, 6, 0, 0, 0)
    return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', compressed) + chunk(b'IEND', b'')

icons = {
    'mipmap-mdpi': 48, 'mipmap-hdpi': 72,
    'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192
}
for folder, size in icons.items():
    path = f'app/src/main/res/{folder}'
    os.makedirs(path, exist_ok=True)
    with open(f'{path}/ic_launcher.png', 'wb') as f:
        f.write(make_png(size, (124, 58, 237)))
    with open(f'{path}/ic_launcher_round.png', 'wb') as f:
        f.write(make_png(size, (124, 58, 237)))
print("Icons created!")
EOF

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FridayAI-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show build result
        run: |
          echo "✅ Build complete!"
          ls -lh app/build/outputs/apk/debug/
